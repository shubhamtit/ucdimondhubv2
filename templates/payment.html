<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCPlanet – Complete Payment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080c10;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 14px 14px 24px;
    }

    /* ───── MAIN CARD ───── */
    .main-payment-card {
      width: 100%;
      max-width: 420px;
      background: #161f2c;
      border-radius: 20px;
      padding: 18px 16px 16px;
      border: 1px solid rgba(45, 212, 191, 0.28);
      box-shadow:
        0 0 20px rgba(45, 212, 191, 0.1),
        0 0 50px rgba(45, 212, 191, 0.05);
    }

    /* ───── TOP ICON ───── */
    .card-icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    .card-icon {
      width: 48px; height: 48px;
      background: #1e3a36;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(45, 212, 191, 0.3);
    }
    .card-icon svg { width: 24px; height: 24px; color: #2dd4bf; }

    /* ───── TITLE ───── */
    .payment-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 3px;
    }
    .payment-sub {
      text-align: center;
      color: #64748b;
      font-size: .8rem;
      margin-bottom: 14px;
    }

    /* ───── ORDER BOX ───── */
    .order-box {
      background: #0f1720;
      border-radius: 12px;
      padding: 0 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .order-row + .order-row {
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .order-row .lbl {
      color: #64748b;
      font-size: .82rem;
    }
    .order-row .val {
      color: #fff;
      font-weight: 600;
      font-size: .82rem;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }
    .order-row .val.amount {
      color: #2dd4bf;
      font-size: 1.15rem;
      font-weight: 700;
    }

    /* ───── QR ───── */
    .qr-container {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    .qr-white {
      background: #fff;
      border-radius: 14px;
      padding: 10px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }
    .qr-white img,
    .qr-white canvas { border-radius: 6px; display: block; }

    /* ───── SCAN LABEL ───── */
    .scan-label {
      text-align: center;
      color: #94a3b8;
      font-size: .78rem;
      margin-bottom: 10px;
    }

    /* ───── TIMER ───── */
    .timer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .timer-row svg { width: 16px; height: 16px; color: #eab308; flex-shrink: 0; }
    .timer-label { color: #94a3b8; font-size: .82rem; }
    .timer-value { color: #eab308; font-weight: 700; font-size: .82rem; }
    .timer-value.danger { color: #ef4444; }

    /* ───── WAITING ───── */
    .waiting-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      color: #94a3b8;
      font-size: .82rem;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(148,163,184,0.3);
      border-top-color: #94a3b8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ───── CANCEL ───── */
    .cancel-btn {
      width: 100%;
      background: #1e2a3a;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 13px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .cancel-btn:hover { background: #263040; color: #fff; }
    .cancel-btn:active { opacity: .85; }

    .how-section { display: none; }
    .warning-section { display: none; }
  </style>
</head>
<body>

  <div class="main-payment-card">

    <!-- Top Icon -->
    <div class="card-icon-wrap">
      <div class="card-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h2 class="payment-title">Complete Payment</h2>
    <p class="payment-sub">Scan QR code with any UPI app</p>

    <!-- Order Detail Box -->
    <div class="order-box">
      <div class="order-row">
        <span class="lbl">Order</span>
        <span class="val" id="valPackage">—</span>
      </div>
      <div class="order-row">
        <span class="lbl">Amount</span>
        <span class="val amount" id="valAmount">—</span>
      </div>
      <div class="order-row">
        <span class="lbl">Transaction ID</span>
        <span class="val" id="valTxn">—</span>
      </div>
    </div>

    <!-- QR Code -->
    <div class="qr-container">
      <div class="qr-white">
        {% if qr_url %}
        <img src="{{ qr_url }}" width="200" height="200">
        {% else %}
        <canvas id="qrCanvas" width="200" height="200"></canvas>
        {% endif %}
      </div>
    </div>

    <!-- Scan label -->
    <p class="scan-label">Scan with any UPI app to complete payment</p>

    <!-- Timer -->
    <div class="timer-row">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke-width="2"/>
        <path stroke-linecap="round" stroke-width="2" d="M12 6v6l4 2"/>
      </svg>
      <span class="timer-label">Expires in:</span>
      <span class="timer-value" id="timerText">04:59</span>
    </div>

    <!-- Waiting -->
    <div class="waiting-row">
      <div class="spinner"></div>
      <span>Waiting for payment...</span>
    </div>

    <!-- Cancel -->
    <button class="cancel-btn" onclick="history.back()">Cancel Payment</button>

  </div>

  <div class="how-section" id="howList"></div>
  <div class="warning-section"></div>

  <script>
    var TXN_ID  = "{{ data.txnId }}";
    var AMOUNT  = "{{ data.amount }}";
    var PACKAGE = "{{ data.package }}";
    var PLAYER  = "{{ data.playerId }}";

    if (!TXN_ID  || TXN_ID  === '') TXN_ID  = 'TXN20260301D5D550';
    if (!AMOUNT  || AMOUNT  === '') AMOUNT  = '399';
    if (!PACKAGE || PACKAGE === '') PACKAGE = '4200 UC • BGMI';

    document.getElementById('valTxn').textContent     = TXN_ID;
    document.getElementById('valAmount').textContent  = '₹' + AMOUNT + '.00';
    document.getElementById('valPackage').textContent = PACKAGE;

    /* countdown */
    var secs = 5 * 60;
    var timerEl = document.getElementById('timerText');
    var iv = setInterval(function () {
      secs--;
      if (secs <= 0) { clearInterval(iv); secs = 0; }
      var m = String(Math.floor(secs / 60)).padStart(2, '0');
      var s = String(secs % 60).padStart(2, '0');
      timerEl.textContent = m + ':' + s;
      if (secs <= 60) timerEl.classList.add('danger');
    }, 1000);

    /* QR renderer */
    (function () {
      var canvas = document.getElementById('qrCanvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var SIZE = 200;
      canvas.width = SIZE; canvas.height = SIZE;

      var payload = 'upi://pay?pa=UCPlanet@upi&pn=UCPlanet&am=' + AMOUNT + '&tn=' + TXN_ID;
      var N = 25; var CELL = SIZE / N;

      var hash = 0;
      for (var i = 0; i < payload.length; i++) {
        hash = ((hash << 5) - hash) + payload.charCodeAt(i); hash |= 0;
      }
      var seed = Math.abs(hash);
      var grid = [];
      for (var r = 0; r < N; r++) {
        var row = [];
        for (var c = 0; c < N; c++) {
          seed = (seed * 1103515245 + 12345) & 0x7fffffff;
          row.push(seed % 2 === 0);
        }
        grid.push(row);
      }
      for (var i = 0; i < 9; i++) {
        for (var j = 0; j < 9; j++) {
          if (i < 8 && j < 8) grid[i][j] = false;
          if (i < 8 && j >= N - 8) grid[i][j] = false;
          if (i >= N - 8 && j < 8) grid[i][j] = false;
        }
      }

      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, SIZE, SIZE);
      ctx.fillStyle = '#000';
      grid.forEach(function (row, r) {
        row.forEach(function (val, c) {
          if (val) ctx.fillRect(c * CELL, r * CELL, CELL - 0.4, CELL - 0.4);
        });
      });

      function finder(x, y) {
        ctx.fillStyle = '#000'; ctx.fillRect(x, y, 7 * CELL, 7 * CELL);
        ctx.fillStyle = '#fff'; ctx.fillRect(x + CELL, y + CELL, 5 * CELL, 5 * CELL);
        ctx.fillStyle = '#000'; ctx.fillRect(x + 2 * CELL, y + 2 * CELL, 3 * CELL, 3 * CELL);
      }
      finder(0, 0); finder((N - 7) * CELL, 0); finder(0, (N - 7) * CELL);
    })();

    /* how-to steps (hidden, functionality preserved) */
    var steps = [
      'Open any UPI app (Google Pay, PhonePe, Paytm, etc.)',
      'Scan the QR code shown above',
      'Verify the amount is ₹' + AMOUNT + '.00',
      'Complete the payment using your UPI PIN',
      'Your top-up will be delivered instantly!'
    ];
    var ol = document.getElementById('howList');
    steps.forEach(function (txt, i) {
      var li = document.createElement('div');
      li.textContent = (i + 1) + '. ' + txt;
      ol.appendChild(li);
    });
  </script>
</body>
</html>
